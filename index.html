<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MELANIE | Tatuaje de Autor</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
</head>
<body>

    <!-- 1. CABECERA -->
    <header class="main-header">
        <h1 class="logo">MELANIE</h1>
        <p class="tagline">ESTUDIO DE TATUAJE PROFESIONAL</p>
    </header>

    <main class="app-container">
        
        <!-- 2. INSTAGRAM PROFILE (DEBAJO DEL TÍTULO) -->
        <section id="instagram-section" class="content-block">
            <div class="insta-mini-profile">
                <div class="insta-avatar">
                    <img src="https://images.unsplash.com/photo-1594465919760-441fe5908ab0?w=100&h=100&fit=crop" alt="Melanie">
                </div>
                <div class="insta-info">
                    <h3>melanieetattoo</h3>
                    <p>Artista • Diseño de Autor</p>
                    <a href="https://www.instagram.com/melanieetattoo" target="_blank" class="insta-btn">Ver Perfil Completo</a>
                </div>
            </div>
            <!-- Grid de Instagram (Pequeño y optimizado) -->
            <div class="insta-mini-grid" id="insta-feed"></div>
        </section>

        <!-- 3. GALERÍA DE EJEMPLOS (OBRAS) -->
        <section id="gallery-section" class="content-block">
            <div class="section-title">
                <span>Colección</span>
                <h2>Obras Seleccionadas</h2>
            </div>
            <div class="work-grid" id="main-gallery"></div>
        </section>

        <!-- 4. SISTEMA DE PRESUPUESTOS (ABAJO DE TODO) -->
        <section id="quote-section" class="content-block quote-bg">
            <div class="wizard-mini">
                <h2>Consultoría Digital</h2>
                <p>Calcula el tiempo e inversión de tu proyecto</p>
                
                <div id="wizard-box" class="wizard-box">
                    <!-- Paso actual cargado por JS -->
                    <div id="step-content"></div>
                </div>
            </div>
        </section>

    </main>

    <footer>
        &copy; 2026 MELANIE TATTOO STUDIO
    </footer>

    <script src="./js/app.js"></script>
</body>
</html>
