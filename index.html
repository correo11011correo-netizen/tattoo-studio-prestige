<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MELANIE | Ink Studio Pro</title>
    <link rel="stylesheet" href="./css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="mobile-nav">
        <h1 class="brand">MELANIE</h1>
        <div class="line-gold"></div>
    </header>

    <main class="app-shell">
        
        <!-- SECCIÓN 1: INSTAGRAM HUB (ESTÁTICO PARA QUE NO FALLE) -->
        <section class="block-social">
            <div class="insta-card">
                <div class="insta-top">
                    <img src="https://images.unsplash.com/photo-1594465919760-441fe5908ab0?w=150&h=150&fit=crop" class="avatar" alt="Melanie">
                    <div class="user-meta">
                        <span class="username">melanieetattoo</span>
                        <span class="verified-tag">Certificada</span>
                        <a href="https://www.instagram.com/melanieetattoo" class="btn-follow">Seguir</a>
                    </div>
                </div>
                <div class="insta-stats">
                    <div class="stat"><b>15k</b><span>Seguidores</span></div>
                    <div class="stat"><b>1.2k</b><span>Posts</span></div>
                    <div class="stat"><b>5/5</b><span>Rating</span></div>
                </div>
                <div class="insta-grid-fixed">
                    <img src="https://images.unsplash.com/photo-1598371839696-5c5bb00bdc28?w=300&h=300&fit=crop" alt="Work 1">
                    <img src="https://images.unsplash.com/photo-1590208701125-300174e30730?w=300&h=300&fit=crop" alt="Work 2">
                    <img src="https://images.unsplash.com/photo-1550537687-c91072c4792d?w=300&h=300&fit=crop" alt="Work 3">
                </div>
            </div>
        </section>

        <!-- SECCIÓN 2: PORTAFOLIO (OBRAS) -->
        <section class="block-gallery">
            <h2 class="title-sec">Colección Destacada</h2>
            <div class="gallery-stack">
                <div class="work-card">
                    <img src="https://images.unsplash.com/photo-1560707854-fb9a10eeaebb?w=600" alt="Tattoo 1">
                    <div class="work-info"><span>REALISMO NOIR</span></div>
                </div>
                <div class="work-card">
                    <img src="https://images.unsplash.com/photo-1611501275019-9b5cda994e8d?w=600" alt="Tattoo 2">
                    <div class="work-info"><span>GEOMETRÍA SAGRADA</span></div>
                </div>
            </div>
        </section>

        <!-- SECCIÓN 3: PRESUPUESTADOR TÁCTIL (MÓVIL OPTIMIZADO) -->
        <section class="block-quote">
            <div class="quote-terminal">
                <h3>Consultoría de Presupuesto</h3>
                <div id="wizard-flow">
                    <!-- Paso 1: Estilo -->
                    <div id="step-1" class="wiz-step active">
                        <p>1. Elige tu estilo favorito:</p>
                        <div class="touch-menu">
                            <button onclick="goStep(2, 1)">FINE LINE</button>
                            <button onclick="goStep(2, 2)">REALISMO</button>
                            <button onclick="goStep(2, 3)">BLACKWORK</button>
                        </div>
                    </div>
                    <!-- Paso 2: Tamaño -->
                    <div id="step-2" class="wiz-step">
                        <p>2. Tamaño aproximado:</p>
                        <div class="touch-menu">
                            <button onclick="finish(10)">10 CM (Pequeño)</button>
                            <button onclick="finish(20)">20 CM (Mediano)</button>
                            <button onclick="finish(30)">30 CM+ (Grande)</button>
                        </div>
                    </div>
                    <!-- Resultado -->
                    <div id="step-res" class="wiz-step">
                        <div class="price-box">
                            <span>Estimación:</span>
                            <h2 id="final-price">$0</h2>
                            <small>Sujeto a cambios tras consultoría</small>
                        </div>
                        <button class="btn-reset" onclick="location.reload()">Reiniciar</button>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <footer>&copy; 2026 MELANIE TATTOO</footer>

    <script src="./js/app.js"></script>
</body>
</html>
